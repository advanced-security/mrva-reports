<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Repository Variant Analysis</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- Important: Increment the version parameter whenever you update MudBlazor to prevent caching issues -->
    <link href="_content/MudBlazor/MudBlazor.min.css?v=1" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>

<div id="app">
    <div id="loading-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#1e1e1e; color:#fff; font-family:'Segoe UI',Roboto,sans-serif;">
        <div style="font-size:1.4rem; margin-bottom:1.5rem;">Loading Analysis Data…</div>
        <div style="width:320px; height:6px; background:#333; border-radius:3px; overflow:hidden;">
            <div id="loading-bar" style="width:0%; height:100%; background:#42A5F5; border-radius:3px; transition:width 0.15s ease;"></div>
        </div>
        <div id="loading-status" style="margin-top:0.75rem; font-size:0.85rem; color:#aaa;">Initializing…</div>
    </div>
</div> 

<div id="blazor-error-ui">
    An unhandled error has occurred.
    <a href="." class="reload">Reload</a>
    <span class="dismiss">🗙</span>
</div>

<script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
<!-- Important: Increment the version parameter whenever you update MudBlazor to prevent caching issues -->
<script src="_content/MudBlazor/MudBlazor.min.js?v=1"></script>

</body>

</html>
